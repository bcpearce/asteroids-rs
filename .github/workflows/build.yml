name: Build and Test

on:
  workflow_call:
    inputs:
      build-config:
        required: true
        type: string
        default: release
        description: "Build configuration [debug, release]"
      coverage:
        required: true
        type: boolean
        default: false
        description: "Run tests with coverage"
      public-url:
        required: false
        type: string
        default: "/"
        description: "Public URL to serve the App"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Rust Toolchain
        run: |-
          rustup target add wasm32-unknown-unknown
          rustup component add llvm-tools
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Install trunk
        run: |-
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo install wasm-bindgen-cli
          cargo install cargo-binstall
          cargo binstall --force trunk -y
          cargo install cargo-llvm-cov
      - name: Build project
        run: trunk build --public-url ${{ inputs.public-url }} --frozen ${{ inputs.build-config == 'release' && '--release' || '' }}
      - name: Test project (Coverage)
        if: ${{ inputs.coverage == 'true'}}
        run: cargo llvm-cov test --lcov --output-path coverage.lcov
      - name: Upload coverage report
        if: ${{ inputs.coverage == 'true'}}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.sha }}-${{ inputs.build-config }}
          path: coverage.lcov
      - name: Test project
        if: ${{ inputs.coverage == 'false' }}
        run: cargo test
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ github.sha }}-${{ inputs.build-config }}
          path: dist/
