name: Continuous Integration

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    build-and-test:
        strategy:
            matrix:
                config: [debug, release]
                include:
                    - config: debug
                      coverage: true
                    - config: release
                      coverage: false
        uses: ./.github/workflows/build.yml
        with:
            build-config: ${{  matrix.config }}
            coverage: ${{ matrix.coverage }}
