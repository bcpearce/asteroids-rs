[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "end-of-file-fixer" },
]

[[repos]]
repo = "local"
hooks = [
    { 
        id = "rustfmt",
        name = "Run rustfmt",
        entry = "cargo",
        args = ["fmt", "--", "--check"],
        language = "system",
        files = "\\.rs$"
    }
]
